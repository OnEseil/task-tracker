name: Build and Deploy

on:
  push:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/oneseil/task-tracker/backend:latest
  MAIL_IMAGE: ghcr.io/oneseil/task-tracker/mail:latest
  SCHEDULER_IMAGE: ghcr.io/oneseil/task-tracker/scheduler:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Mail
        uses: docker/build-push-action@v5
        with:
          context: ./task-tracker-mail
          file: ./task-tracker-mail/Dockerfile
          push: true
          tags: ${{ env.MAIL_IMAGE }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./task-tracker
          file: ./task-tracker/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push Scheduler
        uses: docker/build-push-action@v5
        with:
          context: ./task-tracker-scheduler
          file: ./task-tracker-scheduler/Dockerfile
          push: true
          tags: ${{ env.SCHEDULER_IMAGE }}
          
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute local script on the server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            #!/bin/bash
            bash /home/deploy/deploy.sh
